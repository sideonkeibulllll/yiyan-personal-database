<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tag · maimai</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: 12px; background: var(--color-background); font-family: var(--font-family-base); color: var(--color-on-surface); font-size: var(--type-body); }
.row { display: flex; gap: var(--space-2); align-items: center; margin-bottom: var(--space-2); flex-wrap: wrap; }
.label { width: 92px; flex-shrink: 0; font-size: var(--font-size-caption); color: var(--color-muted-foreground); white-space: nowrap; }
.divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-3) 0; }

/* @component-css-start */
/* Component definitions — extracted to components.css by deterministic script */
.tag { display: inline-flex; align-items: center; gap: var(--space-1); flex-shrink: 0; box-sizing: border-box; padding: 2px var(--space-2); font-size: var(--font-size-caption); font-weight: 500; line-height: 1.4; white-space: nowrap; border: none; border-radius: var(--radius-sm); min-width: 24px; }
.tag-default { background: var(--color-secondary-container); color: var(--color-muted-foreground); }
.tag-primary { background: rgba(232, 89, 12, 0.12); color: var(--color-primary); }
.tag-success { background: rgba(34, 197, 94, 0.12); color: var(--color-success); }
.tag-chip { padding: 2px var(--space-2) 2px var(--space-3); background: var(--color-secondary-container); color: var(--color-foreground); border: 1px solid var(--color-border); border-radius: var(--radius-full); }
.tag-close { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; padding: 0; border: none; background: transparent; color: var(--color-muted-foreground); cursor: pointer; border-radius: var(--radius-sm); transition: background .15s, color .15s; }
.tag-close:hover { background: var(--color-surface-variant); color: var(--color-foreground); }
.tag-close svg { width: 12px; height: 12px; display: block; }
/* @component-css-end */
</style>
</head>
<body>
<div class="row">
  <span class="label">状态</span>
  <span class="tag tag-default">草稿</span>
  <span class="tag tag-primary">活跃</span>
  <span class="tag tag-success">已完成</span>
</div>
<hr class="divider">
<div class="row">
  <span class="label">可移除</span>
  <span class="tag tag-chip">数据分析<button class="tag-close" type="button" aria-label="移除 数据分析"><i data-lucide="x"></i></button></span>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
