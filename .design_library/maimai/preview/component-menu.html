<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; padding: 12px; background: var(--color-surface); font-family: var(--font-body); color: var(--color-on-surface); box-sizing: border-box; }
  *, *::before, *::after { box-sizing: inherit; }
  .row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; }
  .label { font-size: 10px; color: var(--color-muted-foreground); min-width: 80px; max-width: 100px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; padding-top: 9px; }
  .divider { border: none; border-top: 1px solid var(--color-border); margin: 4px 0 10px; }
  /* @component-css-start */
  .menu{display:flex;flex-direction:column;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);box-shadow:var(--shadow-3);padding:var(--space-1) 0;min-width:160px;flex-shrink:0;font-family:var(--font-body);}
  .menu--wide{min-width:180px;}
  .menu-item{display:flex;align-items:center;gap:var(--space-3);height:32px;padding:0 var(--space-4);font-size:var(--font-size-body);line-height:1;color:var(--color-foreground);cursor:pointer;flex-shrink:0;}
  .menu-item:hover{background:var(--color-surface-container);}
  .menu-item--selected{color:var(--color-primary);background:var(--color-primary-container);}
  .menu-item--selected:hover{background:var(--color-primary-container);}
  .menu-item--danger{color:var(--color-error);}
  .menu-item--danger:hover{background:var(--color-surface-container);}
  .menu-item--disabled{opacity:.5;cursor:not-allowed;}
  .menu-item--disabled:hover{background:transparent;}
  .menu-item__icon{width:16px;height:16px;flex-shrink:0;color:var(--color-muted-foreground);}
  .menu-item__label{flex:1;white-space:nowrap;}
  .menu-item__check{width:16px;height:16px;flex-shrink:0;color:var(--color-primary);}
  .menu-divider{border:none;border-top:1px solid var(--color-border);margin:var(--space-1) 0;height:0;}
  /* @component-css-end */
</style>
</head>
<body>
  <div class="row">
    <span class="label">默认菜单</span>
    <div class="menu">
      <div class="menu-item"><span class="menu-item__label">编辑</span></div>
      <div class="menu-item"><span class="menu-item__label">复制</span></div>
      <div class="menu-item menu-item--danger"><span class="menu-item__label">删除</span></div>
    </div>
  </div>
  <hr class="divider">
  <div class="row">
    <span class="label">带图标</span>
    <div class="menu menu--wide">
      <div class="menu-item"><i data-lucide="download" class="menu-item__icon"></i><span class="menu-item__label">导出</span></div>
      <div class="menu-item"><i data-lucide="upload" class="menu-item__icon"></i><span class="menu-item__label">导入</span></div>
      <hr class="menu-divider">
      <div class="menu-item"><i data-lucide="settings" class="menu-item__icon"></i><span class="menu-item__label">设置</span></div>
      <div class="menu-item menu-item--disabled"><span class="menu-item__label">禁用</span></div>
    </div>
  </div>
  <hr class="divider">
  <div class="row">
    <span class="label">选中状态</span>
    <div class="menu">
      <div class="menu-item"><span class="menu-item__label">全部</span></div>
      <div class="menu-item menu-item--selected"><span class="menu-item__label">活跃</span><i data-lucide="check" class="menu-item__check"></i></div>
      <div class="menu-item"><span class="menu-item__label">草稿</span></div>
      <div class="menu-item"><span class="menu-item__label">已完成</span></div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
