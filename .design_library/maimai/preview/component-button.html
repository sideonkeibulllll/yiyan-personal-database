<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button · maimai</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  /* Page scaffold — NOT extracted */
  body { margin: 0; padding: 12px; background: var(--color-surface); font-family: var(--font-family-base); color: var(--color-on-surface); font-size: var(--font-size-body); }
  .row { display: flex; gap: var(--space-3); align-items: center; margin-bottom: var(--space-2); flex-wrap: wrap; }
  .label { width: 92px; flex-shrink: 0; font-size: var(--font-size-caption); color: var(--color-muted-foreground); }
  .divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-3) 0; }

  /* @component-css-start */
  /* Component definitions — extracted to components.css by deterministic script */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); box-sizing: border-box; height: var(--size-button-md); min-width: var(--size-button-md); padding: 0 var(--space-4); border: none; border-radius: var(--radius-sm); font-family: var(--font-family-base); font-size: var(--font-size-body); font-weight: 500; line-height: 1; cursor: pointer; white-space: nowrap; transition: background .15s, border-color .15s, filter .15s; flex-shrink: 0; }
  .btn:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }
  .btn-primary { background: var(--color-primary); color: var(--color-on-primary); }
  .btn-primary:hover { background: var(--color-primary-hover); }
  .btn-secondary { background: var(--color-surface); color: var(--color-foreground); border: 1px solid var(--color-border); }
  .btn-secondary:hover { background: var(--color-surface-container-low); }
  .btn-ghost { background: transparent; color: var(--color-primary); }
  .btn-ghost:hover { background: var(--color-primary-container); }
  .btn-danger { background: var(--color-error); color: #FFFFFF; }
  .btn-danger:hover { filter: brightness(.92); }
  .btn:active { filter: brightness(.88); }
  .btn-sm { height: var(--size-button-sm); min-width: var(--size-button-sm); }
  .btn-lg { height: var(--size-button-lg); min-width: var(--size-button-lg); }
  /* @component-css-end */
</style>
</head>
<body>
  <div class="row"><span class="label">主操作</span><button class="btn btn-primary" data-evidence-sample="primary">导出报告</button></div>
  <div class="row"><span class="label">次要</span><button class="btn btn-secondary" data-evidence-sample="secondary">取消</button></div>
  <div class="row"><span class="label">文字</span><button class="btn btn-ghost" data-evidence-sample="ghost">查看更多</button></div>
  <div class="row"><span class="label">危险</span><button class="btn btn-danger" data-evidence-sample="danger">删除</button></div>
  <hr class="divider">
  <div class="row"><span class="label">禁用</span><button class="btn btn-primary" disabled>导出报告</button><button class="btn btn-secondary" disabled>取消</button><button class="btn btn-ghost" disabled>查看更多</button><button class="btn btn-danger" disabled>删除</button></div>
  <div class="row"><span class="label">尺寸</span><button class="btn btn-primary btn-sm">导出报告</button><button class="btn btn-primary">导出报告</button><button class="btn btn-primary btn-lg">导出报告</button></div>
</body>
</html>
