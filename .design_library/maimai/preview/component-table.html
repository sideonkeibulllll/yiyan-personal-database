<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 12px; background: var(--color-surface); font-family: var(--font-body); color: var(--color-on-surface); box-sizing: border-box; }
  *, *::before, *::after { box-sizing: inherit; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .label { font-size: 10px; color: var(--color-muted-foreground); min-width: 80px; max-width: 100px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid var(--color-border); margin: 4px 0 10px; }
  /* @component-css-start */
  .maimai-table { width: 100%; border-collapse: collapse; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; font-family: var(--font-body); }
  .maimai-table thead th { background: var(--color-surface-container-low); padding: var(--space-2) var(--space-4); font-size: var(--font-size-caption); font-weight: 500; color: var(--color-muted-foreground); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; text-align: left; border-bottom: 1px solid var(--color-border); }
  .maimai-table tbody td { padding: var(--space-2) var(--space-4); font-size: var(--font-size-body); color: var(--color-foreground); border-bottom: 1px solid var(--color-border); vertical-align: middle; }
  .maimai-table tbody tr:last-child td { border-bottom: none; }
  .maimai-table tbody tr:hover { background: var(--color-surface-container-low); }
  .maimai-table .cell-mono { font-family: var(--font-mono); font-size: var(--font-size-body); }
  .maimai-table .cell-actions { white-space: nowrap; }
  .maimai-tag { display: inline-flex; align-items: center; padding: 2px var(--space-2); font-size: var(--font-size-caption); border-radius: var(--radius-sm); line-height: 1.4; }
  .maimai-tag--active { background: rgba(232,89,12,.12); color: var(--color-primary); }
  .maimai-tag--done { background: rgba(47,158,68,.12); color: var(--color-success); }
  .maimai-tag--draft { background: var(--color-secondary-container); color: var(--color-muted-foreground); }
  .maimai-action { display: inline-flex; align-items: center; border: none; background: transparent; color: var(--color-primary); font-size: var(--font-size-caption); font-family: var(--font-body); cursor: pointer; padding: 4px var(--space-2); border-radius: var(--radius-sm); }
  .maimai-action:hover { background: var(--color-primary-container); }
  .maimai-action--danger { color: var(--color-error); }
  .maimai-action--danger:hover { background: rgba(250,82,82,.12); }
  .maimai-table .empty-cell { text-align: center; color: var(--color-muted-foreground); padding: var(--space-6) var(--space-4); font-size: var(--font-size-body); }
  /* @component-css-end */
</style>
</head>
<body>
  <div class="row"><span class="label">默认表格</span></div>
  <div class="row">
    <table class="maimai-table">
      <thead>
        <tr><th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th></tr>
      </thead>
      <tbody>
        <tr><td>李明</td><td>管理员</td><td><span class="maimai-tag maimai-tag--active">活跃</span></td><td>2024-01-15</td></tr>
        <tr><td>王芳</td><td>编辑</td><td><span class="maimai-tag maimai-tag--active">活跃</span></td><td>2024-03-22</td></tr>
        <tr><td>赵磊</td><td>访客</td><td><span class="maimai-tag maimai-tag--draft">草稿</span></td><td>2024-06-10</td></tr>
      </tbody>
    </table>
  </div>
  <hr class="divider">
  <div class="row"><span class="label">状态标签</span></div>
  <div class="row">
    <table class="maimai-table">
      <thead>
        <tr><th>项目名称</th><th>访问量</th><th>状态</th><th>更新时间</th></tr>
      </thead>
      <tbody>
        <tr><td>数据分析面板</td><td class="cell-mono">12,847</td><td><span class="maimai-tag maimai-tag--done">已完成</span></td><td>2分钟前</td></tr>
        <tr><td>用户管理模块</td><td class="cell-mono">3,421</td><td><span class="maimai-tag maimai-tag--active">活跃</span></td><td>1小时前</td></tr>
        <tr><td>报告导出功能</td><td class="cell-mono">856</td><td><span class="maimai-tag maimai-tag--draft">草稿</span></td><td>3天前</td></tr>
      </tbody>
    </table>
  </div>
  <hr class="divider">
  <div class="row"><span class="label">行操作</span></div>
  <div class="row">
    <table class="maimai-table">
      <thead>
        <tr><th>用户名</th><th>角色</th><th>状态</th><th>操作</th></tr>
      </thead>
      <tbody>
        <tr><td>李明</td><td>管理员</td><td><span class="maimai-tag maimai-tag--active">活跃</span></td><td class="cell-actions"><button class="maimai-action" type="button">编辑</button><button class="maimai-action maimai-action--danger" type="button">删除</button></td></tr>
        <tr><td>王芳</td><td>编辑</td><td><span class="maimai-tag maimai-tag--active">活跃</span></td><td class="cell-actions"><button class="maimai-action" type="button">编辑</button><button class="maimai-action maimai-action--danger" type="button">删除</button></td></tr>
        <tr><td>赵磊</td><td>访客</td><td><span class="maimai-tag maimai-tag--draft">草稿</span></td><td class="cell-actions"><button class="maimai-action" type="button">编辑</button><button class="maimai-action maimai-action--danger" type="button">删除</button></td></tr>
      </tbody>
    </table>
  </div>
  <hr class="divider">
  <div class="row"><span class="label">空状态</span></div>
  <div class="row">
    <table class="maimai-table">
      <thead>
        <tr><th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th></tr>
      </thead>
      <tbody>
        <tr><td class="empty-cell" colspan="4">暂无数据</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
